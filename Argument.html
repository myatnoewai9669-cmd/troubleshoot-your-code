<!DOCTYPE html>
<html>
<head>
    <title>Argument Example</title>
</head>
<body>

<h2>Argument Example</h2>

<button onclick="greet('Budi')">Click</button>

<p id="result"></p>

<script>
function greet(name) {
    document.getElementById("result").innerHTML = "Hello " + name;
}
</script>

</body>
</html>
