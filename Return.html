<!DOCTYPE html>
<html>
<head>
    <title>Return Example</title>
</head>
<body>

<h2>Return Example</h2>

<button onclick="showResult()">Add</button>

<p id="result"></p>

<script>
function add(a, b) {
    return a + b;
}

function showResult() {
    let result = add(5, 3);
    document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
